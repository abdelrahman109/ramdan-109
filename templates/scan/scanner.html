{% extends "base.html" %}
{% block body %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: 'Arial', sans-serif;
        padding: 8px;
    }
    
    .scanner-container {
        max-width: 450px;
        margin: 0 auto;
    }
    
    /* Stats Dashboard - مصغر للموبايل */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
        margin-bottom: 12px;
    }
    
    .stat-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        padding: 10px 5px;
        text-align: center;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        border: 1px solid rgba(255,215,0,0.3);
    }
    
    .stat-card.primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .stat-card.success {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        color: white;
    }
    
    .stat-card.warning {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        color: white;
    }
    
    .stat-icon {
        font-size: 1.3rem;
        margin-bottom: 3px;
    }
    
    .stat-label {
        font-size: 0.7rem;
        opacity: 0.9;
        margin-bottom: 2px;
    }
    
    .stat-value {
        font-size: 1.3rem;
        font-weight: bold;
    }
    
    .stat-sub {
        font-size: 0.65rem;
        opacity: 0.8;
    }
    
    /* Scanner Section - مصغر */
    .scanner-section {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,215,0,0.3);
    }
    
    .scanner-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
    }
    
    .scanner-title {
        color: #764ba2;
        font-size: 1.2rem;
        text-align: center;
    }
    
    .scanner-controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }
    
    .gate-input, .officer-input {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 0.85rem;
        background: white;
        min-width: 120px;
    }
    
    /* Quick Actions - شبكة 2×2 */
    .quick-actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
        margin-bottom: 12px;
    }
    
    .action-btn {
        padding: 10px 5px;
        border: none;
        border-radius: 10px;
        background: white;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font-size: 0.7rem;
        border: 1px solid #eee;
    }
    
    .action-icon {
        font-size: 1.2rem;
    }
    
    .action-label {
        font-weight: bold;
        color: #333;
    }
    
    .action-desc {
        display: none; /* إخفاء الوصف لتوفير مساحة */
    }
    
    /* Scanner Preview */
    .scanner-preview {
        background: #1a1a2e;
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 12px;
        border: 2px solid #764ba2;
    }
    
    #reader {
        width: 100% !important;
        border-radius: 8px;
        overflow: hidden;
    }
    
    #reader video {
        border-radius: 8px;
        max-height: 250px;
        object-fit: cover;
    }
    
    /* Manual Input */
    .manual-input {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }
    
    .manual-input input {
        flex: 1;
        padding: 10px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 0.85rem;
        background: white;
    }
    
    .manual-input button {
        padding: 10px 15px;
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: bold;
        white-space: nowrap;
    }
    
    /* Result Display - مصغر */
    .result-card {
        border-radius: 12px;
        padding: 15px;
        margin-top: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        font-size: 0.9rem;
    }
    
    .result-card.success {
        background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
        border: 1px solid #28a745;
    }
    
    .result-card.warning {
        background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
        border: 1px solid #ffc107;
    }
    
    .result-card.error {
        background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
        border: 1px solid #dc3545;
    }
    
    .result-icon {
        font-size: 2rem;
        text-align: center;
        margin-bottom: 5px;
    }
    
    .result-title {
        font-size: 1.2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 8px;
    }
    
    .result-details {
        font-size: 0.9rem;
        line-height: 1.5;
        text-align: center;
    }
    
    .result-details p {
        margin: 3px 0;
    }
    
    .result-badge {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
        margin-top: 5px;
    }
    
    /* Recent Scans - مصغر */
    .recent-scans {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        border: 1px solid rgba(255,215,0,0.3);
    }
    
    .recent-title {
        color: #764ba2;
        font-size: 1rem;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    
    .scans-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
    }
    
    .scans-table th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 6px 4px;
        font-size: 0.75rem;
    }
    
    .scans-table td {
        padding: 6px 4px;
        border-bottom: 1px solid #eee;
        text-align: right;
    }
    
    .scan-badge {
        display: inline-block;
        padding: 3px 6px;
        border-radius: 12px;
        font-size: 0.65rem;
        font-weight: bold;
        color: white;
    }
    
    .scan-badge.success {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }
    
    .scan-badge.warning {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }
    
    .scan-badge.error {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    /* تحسينات للموبايل */
    @media (max-width: 380px) {
        .stats-grid {
            grid-template-columns: 1fr;
        }
        
        .quick-actions {
            grid-template-columns: 1fr;
        }
        
        .manual-input {
            flex-direction: column;
        }
        
        .manual-input button {
            width: 100%;
        }
        
        .scanner-controls {
            flex-direction: column;
        }
        
        .gate-input, .officer-input {
            width: 100%;
        }
    }
</style>

<div class="scanner-container">
    <!-- Stats Dashboard مصغر -->
    <div class="stats-grid" id="statsDashboard">
        <div class="stat-card primary">
            <div class="stat-icon">🎟</div>
            <div class="stat-label">الحضور</div>
            <div class="stat-value" id="totalAttendees">0</div>
        </div>
        <div class="stat-card success">
            <div class="stat-icon">✅</div>
            <div class="stat-label">دخل</div>
            <div class="stat-value" id="checkedIn">0</div>
        </div>
        <div class="stat-card warning">
            <div class="stat-icon">⏳</div>
            <div class="stat-label">متبقي</div>
            <div class="stat-value" id="remaining">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-label">نسبة</div>
            <div class="stat-value" id="percentage">0%</div>
        </div>
    </div>
    
    <!-- Scanner Section -->
    <div class="scanner-section">
        <div class="scanner-header">
            <div class="scanner-title">📱 ماسح QR</div>
            <div class="scanner-controls">
                <input type="text" id="gateName" class="gate-input" placeholder="البوابة" value="بوابة 1">
                <input type="text" id="officerName" class="officer-input" placeholder="الموظف">
            </div>
        </div>
        
        <!-- Quick Actions مصغرة -->
        <div class="quick-actions">
            <button class="action-btn" onclick="startScanner()">
                <span class="action-icon">📷</span>
                <span class="action-label">تشغيل</span>
            </button>
            <button class="action-btn" onclick="stopScanner()">
                <span class="action-icon">⏹</span>
                <span class="action-label">إيقاف</span>
            </button>
            <button class="action-btn" onclick="clearResult()">
                <span class="action-icon">🔄</span>
                <span class="action-label">مسح</span>
            </button>
            <button class="action-btn" onclick="refreshStats()">
                <span class="action-icon">📊</span>
                <span class="action-label">تحديث</span>
            </button>
        </div>
        
        <!-- Scanner Preview -->
        <div class="scanner-preview">
            <div id="reader"></div>
        </div>
        
        <!-- Manual Input -->
        <div class="manual-input">
            <input type="text" id="manualToken" placeholder="الصق رمز QR">
            <button onclick="manualCheckin()">تسجيل</button>
        </div>
        
        <!-- Result Display -->
        <div id="result" class="result-card" style="display: none;">
            <div id="resultIcon" class="result-icon"></div>
            <div id="resultTitle" class="result-title"></div>
            <div id="resultDetails" class="result-details"></div>
        </div>
    </div>
    
    <!-- Recent Scans مصغرة -->
    <div class="recent-scans">
        <div class="recent-title">
            <span>📋</span>
            <span>آخر العمليات</span>
        </div>
        <table class="scans-table">
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>الاسم</th>
                    <th>النتيجة</th>
                </tr>
            </thead>
            <tbody id="recentScansList">
                <tr>
                    <td colspan="3" style="text-align: center; padding: 10px;">جاري التحميل...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    let html5QrcodeScanner = null;
    let lastResult = null;
    
    // Auto-refresh stats
    setInterval(refreshStats, 30000);
    
    // Load initial data
    document.addEventListener('DOMContentLoaded', function() {
        refreshStats();
        loadRecentScans();
    });
    
    // Start scanner
    function startScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
        }
        
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: 200,
                rememberLastUsedCamera: true,
                showTorchButtonIfSupported: true
            }
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanError);
    }
    
    // Stop scanner
    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;
        }
    }
    
    // Scan success
    function onScanSuccess(decodedText) {
        if (lastResult === decodedText) return;
        lastResult = decodedText;
        
        let token = extractToken(decodedText);
        if (token) {
            checkinTicket(token);
        } else {
            showResult('error', '❌', 'رمز غير صالح', 'لم نتمكن من قراءة رمز QR');
        }
    }
    
    function onScanError(error) {
        console.log(error);
    }
    
    // Extract token from QR
    function extractToken(text) {
        try {
            if (text.includes('/ticket/')) {
                return text.split('/ticket/').pop().split('?')[0];
            }
            return text.trim();
        } catch {
            return text.trim();
        }
    }
    
    // Manual checkin
    function manualCheckin() {
        let token = document.getElementById('manualToken').value.trim();
        if (!token) {
            alert('الرجاء إدخال رمز QR');
            return;
        }
        checkinTicket(token);
    }
    
    // Checkin ticket
    async function checkinTicket(token) {
        let gateName = document.getElementById('gateName').value.trim() || 'بوابة 1';
        let officerName = document.getElementById('officerName').value.trim() || 'موظف';
        
        try {
            let response = await fetch('/api/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    qr_token: token,
                    gate_name: gateName,
                    checked_in_by: officerName
                })
            });
            
            let data = await response.json();
            
            // تفريغ الحقل بعد المسح
            document.getElementById('manualToken').value = '';
            
            if (data.status === 'success') {
                showResult('success', '✅', 'دخول مسموح', 
                    `<p><strong>${data.name || ''}</strong></p>
                     <p>${data.ticket_type || ''}</p>
                     <span class="result-badge" style="background: #28a745; color: white;">✓ تم التسجيل</span>`);
                refreshStats();
                loadRecentScans();
            } else if (data.status === 'already_used') {
                showResult('warning', '⚠️', 'مستخدمة مسبقاً', 
                    `<p><strong>${data.name || ''}</strong></p>
                     <span class="result-badge" style="background: #ffc107; color: black;">⏱ دخل من قبل</span>`);
                refreshStats();
                loadRecentScans();
            } else if (data.status === 'unpaid') {
                showResult('warning', '⚠️', 'غير مدفوعة', 
                    `<p>هذه التذكرة لم يتم دفعها</p>`);
            } else {
                showResult('error', '❌', 'غير صالحة', 
                    `<p>${data.message || 'رمز غير صالح'}</p>`);
            }
        } catch (error) {
            console.error('Error:', error);
            showResult('error', '❌', 'خطأ', 'حدث خطأ في الاتصال');
        }
    }
    
    // Show result
    function showResult(type, icon, title, details) {
        let resultDiv = document.getElementById('result');
        let iconDiv = document.getElementById('resultIcon');
        let titleDiv = document.getElementById('resultTitle');
        let detailsDiv = document.getElementById('resultDetails');
        
        resultDiv.style.display = 'block';
        resultDiv.className = 'result-card ' + type;
        iconDiv.innerHTML = icon;
        titleDiv.innerHTML = title;
        detailsDiv.innerHTML = details;
        
        // Auto-hide after 5 seconds
        if (type === 'success') {
            setTimeout(() => {
                if (resultDiv.style.display === 'block') {
                    resultDiv.style.display = 'none';
                }
            }, 5000);
        }
    }
    
    // Clear result
    function clearResult() {
        document.getElementById('result').style.display = 'none';
        document.getElementById('manualToken').value = '';
        lastResult = null;
    }
    
    // Refresh stats
    async function refreshStats() {
        try {
            let response = await fetch('/api/stats');
            let data = await response.json();
            
            document.getElementById('totalAttendees').innerText = data.total || 0;
            document.getElementById('checkedIn').innerText = data.checked_in || 0;
            
            let remaining = (data.total || 0) - (data.checked_in || 0);
            document.getElementById('remaining').innerText = remaining < 0 ? 0 : remaining;
            
            let percentage = data.total > 0 ? Math.round((data.checked_in / data.total) * 100) : 0;
            document.getElementById('percentage').innerText = percentage + '%';
            
        } catch (error) {
            console.log('Error refreshing stats:', error);
        }
    }
    
    // Load recent scans
    async function loadRecentScans() {
        try {
            let response = await fetch('/api/recent-scans');
            let data = await response.json();
            
            let list = document.getElementById('recentScansList');
            if (data.scans && data.scans.length > 0) {
                let html = '';
                data.scans.slice(0, 5).forEach(scan => { // آخر 5 عمليات بس
                    let statusClass = scan.result === 'success' ? 'success' : 
                                    (scan.result === 'already_used' ? 'warning' : 'error');
                    let statusText = scan.result === 'success' ? '✓' : 
                                    (scan.result === 'already_used' ? '⚠️' : '✗');
                    
                    html += `<tr>
                        <td>${scan.time || ''}</td>
                        <td>${scan.name?.substring(0, 10) || ''}</td>
                        <td><span class="scan-badge ${statusClass}">${statusText}</span></td>
                    </tr>`;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 10px;">لا توجد عمليات</td></tr>';
            }
        } catch (error) {
            console.log('Error loading scans:', error);
        }
    }
</script>
{% endblock %}
