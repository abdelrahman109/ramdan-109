{% extends "base.html" %}
{% block body %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: 'Arial', sans-serif;
    }
    
    .scanner-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }
    
    /* Stats Dashboard */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    
    .stat-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 25px 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        border: 2px solid rgba(255,215,0,0.3);
        transition: transform 0.3s ease;
    }
    
    .stat-card:hover {
        transform: translateY(-5px);
    }
    
    .stat-card.primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .stat-card.success {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        color: white;
    }
    
    .stat-card.warning {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        color: white;
    }
    
    .stat-icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }
    
    .stat-label {
        font-size: 1rem;
        opacity: 0.9;
        margin-bottom: 5px;
    }
    
    .stat-value {
        font-size: 2.5rem;
        font-weight: bold;
    }
    
    .stat-sub {
        font-size: 0.9rem;
        opacity: 0.8;
        margin-top: 5px;
    }
    
    /* Scanner Section */
    .scanner-section {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 30px;
        margin-bottom: 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        border: 2px solid rgba(255,215,0,0.3);
    }
    
    .scanner-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        flex-wrap: wrap;
        gap: 15px;
    }
    
    .scanner-title {
        color: #764ba2;
        font-size: 1.8rem;
    }
    
    .scanner-controls {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }
    
    .gate-input {
        padding: 12px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 15px;
        font-size: 1rem;
        width: 200px;
        background: white;
    }
    
    .gate-input:focus {
        outline: none;
        border-color: #764ba2;
    }
    
    .officer-input {
        padding: 12px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 15px;
        font-size: 1rem;
        width: 200px;
        background: white;
    }
    
    .officer-input:focus {
        outline: none;
        border-color: #764ba2;
    }
    
    .btn-group {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        flex-wrap: wrap;
    }
    
    .btn {
        padding: 15px 30px;
        border: none;
        border-radius: 15px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        justify-content: center;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .btn-success {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        color: white;
    }
    
    .btn-warning {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        color: white;
    }
    
    .btn-danger {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
    }
    
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    
    .btn:active {
        transform: translateY(0);
    }
    
    /* Scanner Preview */
    .scanner-preview {
        background: #1a1a2e;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 25px;
        border: 3px solid #764ba2;
    }
    
    #reader {
        width: 100% !important;
        border-radius: 15px;
        overflow: hidden;
    }
    
    #reader video {
        border-radius: 15px;
    }
    
    .manual-input {
        display: flex;
        gap: 15px;
        margin-top: 20px;
    }
    
    .manual-input input {
        flex: 1;
        padding: 15px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 15px;
        font-size: 1rem;
        background: white;
    }
    
    .manual-input input:focus {
        outline: none;
        border-color: #764ba2;
    }
    
    /* Result Display */
    .result-card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        margin-top: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border: 2px solid #e0e0e0;
        transition: all 0.3s ease;
    }
    
    .result-card.success {
        background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
        border-color: #28a745;
    }
    
    .result-card.error {
        background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
        border-color: #dc3545;
    }
    
    .result-card.warning {
        background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
        border-color: #ffc107;
    }
    
    .result-icon {
        font-size: 4rem;
        text-align: center;
        margin-bottom: 15px;
    }
    
    .result-title {
        font-size: 2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
    
    .result-details {
        font-size: 1.2rem;
        line-height: 2;
        text-align: center;
    }
    
    .result-details p {
        margin: 10px 0;
    }
    
    .result-badge {
        display: inline-block;
        padding: 10px 25px;
        border-radius: 30px;
        font-size: 1.3rem;
        font-weight: bold;
        margin: 10px 0;
    }
    
    /* Recent Scans */
    .recent-scans {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        border: 2px solid rgba(255,215,0,0.3);
    }
    
    .recent-title {
        color: #764ba2;
        font-size: 1.5rem;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .scans-table {
        width: 100%;
        border-collapse: collapse;
    }
    
    .scans-table th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px;
        text-align: right;
        font-size: 1rem;
    }
    
    .scans-table td {
        padding: 12px 15px;
        border-bottom: 1px solid #e0e0e0;
        text-align: right;
    }
    
    .scans-table tr:hover {
        background: #f8f9ff;
    }
    
    .scan-badge {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: bold;
        color: white;
    }
    
    .scan-badge.success {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }
    
    .scan-badge.error {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    /* Quick Actions */
    .quick-actions {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        flex-wrap: wrap;
    }
    
    .action-btn {
        flex: 1;
        min-width: 150px;
        padding: 20px;
        border: none;
        border-radius: 20px;
        background: white;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        border: 2px solid transparent;
    }
    
    .action-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        border-color: #764ba2;
    }
    
    .action-icon {
        font-size: 2.5rem;
    }
    
    .action-label {
        font-size: 1.1rem;
        font-weight: bold;
        color: #333;
    }
    
    .action-desc {
        font-size: 0.9rem;
        color: #666;
    }
    
    @media (max-width: 768px) {
        .scanner-header {
            flex-direction: column;
            align-items: stretch;
        }
        
        .gate-input, .officer-input {
            width: 100%;
        }
        
        .btn-group {
            flex-direction: column;
        }
        
        .manual-input {
            flex-direction: column;
        }
        
        .stats-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="scanner-container">
    <!-- Stats Dashboard -->
    <div class="stats-grid" id="statsDashboard">
        <div class="stat-card primary">
            <div class="stat-icon">🎟</div>
            <div class="stat-label">إجمالي الحضور</div>
            <div class="stat-value" id="totalAttendees">0</div>
            <div class="stat-sub">شخص</div>
        </div>
        <div class="stat-card success">
            <div class="stat-icon">✅</div>
            <div class="stat-label">تم الدخول</div>
            <div class="stat-value" id="checkedIn">0</div>
            <div class="stat-sub">شخص</div>
        </div>
        <div class="stat-card warning">
            <div class="stat-icon">⏳</div>
            <div class="stat-label">المتبقي</div>
            <div class="stat-value" id="remaining">0</div>
            <div class="stat-sub">شخص</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-label">نسبة الدخول</div>
            <div class="stat-value" id="percentage">0%</div>
            <div class="stat-sub">من إجمالي الحضور</div>
        </div>
    </div>
    
    <!-- Scanner Section -->
    <div class="scanner-section">
        <div class="scanner-header">
            <h2 class="scanner-title">📱 ماسح QR</h2>
            <div class="scanner-controls">
                <input type="text" id="gateName" class="gate-input" placeholder="اسم البوابة (مثل: بوابة 1)" value="البوابة الرئيسية">
                <input type="text" id="officerName" class="officer-input" placeholder="اسم الموظف">
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="action-btn" onclick="startScanner()">
                <span class="action-icon">📷</span>
                <span class="action-label">تشغيل الكاميرا</span>
                <span class="action-desc">مسح QR مباشرة</span>
            </button>
            <button class="action-btn" onclick="stopScanner()">
                <span class="action-icon">⏹</span>
                <span class="action-label">إيقاف الكاميرا</span>
                <span class="action-desc">إيقاف المسح</span>
            </button>
            <button class="action-btn" onclick="clearResult()">
                <span class="action-icon">🔄</span>
                <span class="action-label">مسح النتيجة</span>
                <span class="action-desc">تفريغ الشاشة</span>
            </button>
            <button class="action-btn" onclick="refreshStats()">
                <span class="action-icon">📊</span>
                <span class="action-label">تحديث الإحصائيات</span>
                <span class="action-desc">تحديث الأرقام</span>
            </button>
        </div>
        
        <!-- Scanner Preview -->
        <div class="scanner-preview">
            <div id="reader"></div>
        </div>
        
        <!-- Manual Input -->
        <div class="manual-input">
            <input type="text" id="manualToken" placeholder="أو الصق رمز QR هنا">
            <button class="btn btn-primary" onclick="manualCheck()">
                <span>🔍</span> تحقق يدوي
            </button>
            <button class="btn btn-success" onclick="manualCheckin()">
                <span>✅</span> تسجيل دخول يدوي
            </button>
        </div>
        
        <!-- Result Display -->
        <div id="result" class="result-card" style="display: none;">
            <div id="resultIcon" class="result-icon"></div>
            <div id="resultTitle" class="result-title"></div>
            <div id="resultDetails" class="result-details"></div>
        </div>
    </div>
    
    <!-- Recent Scans -->
    <div class="recent-scans">
        <h3 class="recent-title">
            <span>📋</span>
            <span>آخر عمليات المسح</span>
        </h3>
        <table class="scans-table">
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>الاسم</th>
                    <th>نوع التذكرة</th>
                    <th>النتيجة</th>
                </tr>
            </thead>
            <tbody id="recentScansList">
                <tr>
                    <td colspan="4" style="text-align: center; padding: 30px;">جاري تحميل البيانات...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    let html5QrcodeScanner = null;
    let lastResult = null;
    
    // Auto-refresh stats every 30 seconds
    setInterval(refreshStats, 30000);
    
    // Load initial data
    document.addEventListener('DOMContentLoaded', function() {
        refreshStats();
        loadRecentScans();
    });
    
    // Start scanner
    function startScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
        }
        
        html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: 250,
                rememberLastUsedCamera: true,
                showTorchButtonIfSupported: true
            }
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanError);
    }
    
    // Stop scanner
    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;
        }
    }
    
    // Scan success
    function onScanSuccess(decodedText) {
        if (lastResult === decodedText) return;
        lastResult = decodedText;
        
        let token = extractToken(decodedText);
        if (token) {
            checkinTicket(token);
        } else {
            showResult('error', '❌', 'رمز غير صالح', 'لم نتمكن من قراءة رمز QR بشكل صحيح');
        }
    }
    
    function onScanError(error) {
        console.log(error);
    }
    
    // Extract token from QR
    function extractToken(text) {
        try {
            if (text.includes('/ticket/')) {
                return text.split('/ticket/').pop().split('?')[0];
            }
            return text.trim();
        } catch {
            return text.trim();
        }
    }
    
    // Manual check
    function manualCheck() {
        let token = document.getElementById('manualToken').value.trim();
        if (!token) {
            alert('الرجاء إدخال رمز QR');
            return;
        }
        validateTicket(token);
    }
    
    // Manual checkin
    function manualCheckin() {
        let token = document.getElementById('manualToken').value.trim();
        if (!token) {
            alert('الرجاء إدخال رمز QR');
            return;
        }
        checkinTicket(token);
    }
    
    // Validate ticket only
    async function validateTicket(token) {
        try {
            let response = await fetch('/api/validate-ticket', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_token: token })
            });
            
            let data = await response.json();
            
            if (data.status === 'valid') {
                showResult('success', '✅', 'تذكرة صالحة', 
                    `<p><strong>الاسم:</strong> ${data.name || 'غير معروف'}</p>
                     <p><strong>النوع:</strong> ${data.ticket_type || 'غير محدد'}</p>
                     <p><strong>الكود:</strong> ${data.booking_code || 'غير معروف'}</p>`);
            } else {
                showResult('error', '❌', 'تذكرة غير صالحة', data.message || 'لا يمكن التحقق من التذكرة');
            }
        } catch (error) {
            showResult('error', '❌', 'خطأ', 'حدث خطأ في الاتصال');
        }
    }
    
    // Checkin ticket
    async function checkinTicket(token) {
        let gateName = document.getElementById('gateName').value.trim() || 'البوابة الرئيسية';
        let officerName = document.getElementById('officerName').value.trim() || 'موظف';
        
        try {
            let response = await fetch('/api/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    qr_token: token,
                    gate_name: gateName,
                    checked_in_by: officerName
                })
            });
            
            let data = await response.json();
            
            if (data.status === 'success') {
                showResult('success', '✅', 'دخول مسموح', 
                    `<p><strong>الاسم:</strong> ${data.name || 'غير معروف'}</p>
                     <p><strong>النوع:</strong> ${data.ticket_type || 'غير محدد'}</p>
                     <p><strong>الكود:</strong> ${data.booking_code || 'غير معروف'}</p>
                     <span class="result-badge" style="background: #28a745; color: white;">✓ تم تسجيل الدخول</span>`);
                refreshStats();
                loadRecentScans();
            } else if (data.status === 'already_used') {
                showResult('warning', '⚠️', 'التذكرة مستخدمة مسبقاً', 
                    `<p><strong>الاسم:</strong> ${data.name || 'غير معروف'}</p>
                     <p><strong>النوع:</strong> ${data.ticket_type || 'غير محدد'}</p>
                     <p><strong>الكود:</strong> ${data.booking_code || 'غير معروف'}</p>
                     <span class="result-badge" style="background: #ffc107; color: black;">⏱ تم الدخول من قبل</span>`);
            } else if (data.status === 'unpaid') {
                showResult('warning', '⚠️', 'التذكرة غير مدفوعة', 
                    `<p>هذه التذكرة لم يتم دفعها بعد</p>`);
            } else {
                showResult('error', '❌', 'خطأ', data.message || 'تذكرة غير صالحة');
            }
        } catch (error) {
            showResult('error', '❌', 'خطأ', 'حدث خطأ في الاتصال');
        }
    }
    
    // Show result
    function showResult(type, icon, title, details) {
        let resultDiv = document.getElementById('result');
        let iconDiv = document.getElementById('resultIcon');
        let titleDiv = document.getElementById('resultTitle');
        let detailsDiv = document.getElementById('resultDetails');
        
        resultDiv.style.display = 'block';
        resultDiv.className = 'result-card ' + type;
        iconDiv.innerHTML = icon;
        titleDiv.innerHTML = title;
        detailsDiv.innerHTML = details;
        
        // Auto-hide after 10 seconds for success
        if (type === 'success') {
            setTimeout(() => {
                if (resultDiv.style.display === 'block') {
                    resultDiv.style.display = 'none';
                }
            }, 10000);
        }
    }
    
    // Clear result
    function clearResult() {
        document.getElementById('result').style.display = 'none';
        document.getElementById('manualToken').value = '';
        lastResult = null;
    }
    
    // Refresh stats
    async function refreshStats() {
        try {
            let response = await fetch('/api/stats');
            let data = await response.json();
            
            document.getElementById('totalAttendees').innerText = data.total || 0;
            document.getElementById('checkedIn').innerText = data.checked_in || 0;
            
            let remaining = (data.total || 0) - (data.checked_in || 0);
            document.getElementById('remaining').innerText = remaining < 0 ? 0 : remaining;
            
            let percentage = data.total > 0 ? Math.round((data.checked_in / data.total) * 100) : 0;
            document.getElementById('percentage').innerText = percentage + '%';
            
            loadRecentScans();
        } catch (error) {
            console.log('Error refreshing stats:', error);
        }
    }
    
    // Load recent scans
    async function loadRecentScans() {
        try {
            let response = await fetch('/api/recent-scans');
            let data = await response.json();
            
            let list = document.getElementById('recentScansList');
            if (data.scans && data.scans.length > 0) {
                let html = '';
                data.scans.forEach(scan => {
                    let statusClass = scan.result === 'success' ? 'success' : 'error';
                    let statusText = scan.result === 'success' ? '✓ دخول' : '✗ رفض';
                    
                    html += `<tr>
                        <td>${scan.time || ''}</td>
                        <td>${scan.name || 'غير معروف'}</td>
                        <td>${scan.ticket_type || 'غير محدد'}</td>
                        <td><span class="scan-badge ${statusClass}">${statusText}</span></td>
                    </tr>`;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px;">لا توجد عمليات مسح حتى الآن</td></tr>';
            }
        } catch (error) {
            console.log('Error loading scans:', error);
        }
    }
</script>
{% endblock %}
