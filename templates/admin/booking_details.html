  <div class="actions" style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
    
    {% if booking.status == 'pending_review' %}
      <form method="post" action="{{ url_for('admin_approve_booking', booking_id=booking.id) }}" style="display:inline;" onsubmit="return confirm('✅ هل أنت متأكد من قبول هذا الدفع؟')">
        <button type="submit" style="background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">✅ قبول الدفع</button>
      </form>
      
      <form method="post" action="{{ url_for('admin_reject_booking', booking_id=booking.id) }}" style="display:inline;" onsubmit="return confirm('❌ هل أنت متأكد من رفض هذا الدفع؟')">
        <button type="submit" style="background: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">❌ رفض الدفع</button>
      </form>
    {% endif %}
    
    {% if booking.is_attending and booking.status in ['paid','used'] %}
      <form method="post" action="{{ url_for('admin_resend_ticket', booking_id=booking.id) }}" style="display:inline;" onsubmit="return confirm('🔄 هل أنت متأكد من إعادة إرسال التذكرة؟')">
        <button type="submit" style="background: #ffc107; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">🔄 إعادة إرسال التذكرة</button>
      </form>
    {% endif %}
    
    <!-- أزرار الحذف والإلغاء الجديدة -->
    <div style="margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 20px;">
      <h3 style="color: #666;">⚙️ إجراءات إدارية</h3>
      
      {% if booking.status != 'rejected' %}
        <form method="post" action="{{ url_for('admin_reject_booking', booking_id=booking.id) }}" style="display:inline;" onsubmit="return confirm('❌ هل أنت متأكد من إلغاء هذا الحجز؟')">
          <button type="submit" style="background: #ff9800; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">⚠️ إلغاء الحجز</button>
        </form>
      {% endif %}
      
      <form method="post" action="{{ url_for('admin_delete_booking', booking_id=booking.id) }}" style="display:inline;" onsubmit="return confirm('🚨 تحذير: هل أنت متأكد من حذف هذا الحجز نهائياً؟\nهذا الإجراء لا يمكن التراجع عنه!')">
        <button type="submit" style="background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">🗑️ حذف الحجز نهائياً</button>
      </form>
    </div>
  </div>
