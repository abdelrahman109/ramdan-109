<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ EVENT_NAME }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', 'Helvetica', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* Navigation Bar */
    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 15px 25px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      border: 1px solid rgba(255,215,0,0.3);
    }
    
    .nav-link {
      color: #333;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .nav-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    
    .nav-link.active {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    /* Cards */
    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,215,0,0.3);
    }
    
    .card.narrow {
      max-width: 450px;
      margin: 40px auto;
    }
    
    /* Grid for stats */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 15px;
      padding: 25px 20px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,215,0,0.3);
    }
    
    .stat strong {
      display: block;
      margin-bottom: 15px;
      font-size: 1.1rem;
      opacity: 0.9;
    }
    
    .stat span {
      font-size: 2.5rem;
      font-weight: bold;
      display: block;
    }
    
    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
      padding: 15px 10px;
    }
    
    td {
      padding: 12px 10px;
      border-bottom: 1px solid #eee;
      text-align: right;
    }
    
    tr:hover {
      background: #f8f9ff;
    }
    
    /* Buttons */
    button, .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      margin: 5px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    button:hover, .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    
    button.danger {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    /* Flash messages */
    .flash-wrap {
      margin-bottom: 20px;
    }
    
    .flash {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      color: white;
      padding: 15px 25px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    /* Proof image */
    .proof {
      max-width: 400px;
      border-radius: 15px;
      border: 3px solid #764ba2;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    /* Badges */
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .badge.ok {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }
    
    .badge.warn {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }
    
    .badge.error {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    
    /* Filters */
    .filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .filters input, .filters select {
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 1rem;
    }
    
    /* Actions */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    
    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    /* Headings */
    h1 {
      color: white;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 0 5px 15px rgba(0,0,0,0.3);
      text-align: center;
    }
    
    h2 {
      color: #764ba2;
      margin-bottom: 20px;
      font-size: 2rem;
    }
    
    /* Links */
    a {
      color: #764ba2;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Navigation Bar -->
    <div class="navbar">
      <a href="{{ url_for('admin_dashboard') }}" class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
        🏠 الرئيسية
      </a>
      <a href="{{ url_for('admin_bookings') }}" class="nav-link {% if request.endpoint == 'admin_bookings' %}active{% endif %}">
        📋 الحجوزات
      </a>
      <a href="{{ url_for('admin_broadcast') }}" class="nav-link {% if request.endpoint == 'admin_broadcast' %}active{% endif %}">
        📢 الرسائل الجماعية
      </a>
      <a href="{{ url_for('export_bookings') }}" class="nav-link">
        📥 تقرير CSV
      </a>
      <a href="{{ url_for('admin_logout') }}" class="nav-link" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); margin-right: auto;">
        🚪 خروج
      </a>
    </div>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-wrap">
          {% for msg in messages %}
            <div class="flash">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    
    {% block body %}{% endblock %}
  </div>
  
  <script src="{{ url_for('static', filename='js/admin_confirm.js') }}"></script>
</body>
</html>
